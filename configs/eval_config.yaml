# =======================================================
# PoFTR Evaluation Configuration
# =======================================================
# Edit this file before running eval_aerosync.py
# or eval_sim2real.py

# --- Models to evaluate ---
# Comment out any model you want to skip.
models:
  - {name: PoFTR,            base_model: xoftr,       use_phys: true}
  - {name: XoFTR,            base_model: xoftr,       use_phys: false}

# --- Checkpoints ---
checkpoint_base: checkpoints/matchers
# Expected structure:
#   checkpoints/matchers/{band_pair}/{model_name}/{phys|no_phys}/best.ckpt

# --- AeroSync Evaluation (eval_aerosync.py) ---
band_pairs:
  - 9um_pan
  - 11um_pan
  - 9um_11um

# --- Sim2Real Evaluation (eval_sim2real.py) ---
sim2real_data_root: data/real_world         # path to real-world .npz files
sim2real_csv_dir:   data/real_world/csv_outputs  # path to matched pairs CSVs
stats_base:         data/AeroSync           # per-pair stats: {stats_base}/{wl0}_{wl1}/stats.json
coeff_dir:          data/real_world/coeffs  # coefficients_*.npy files for ThermalRegress
dist_thresh:        10.0               # max distance (meters) between paired captures
n_samples:          320                # number of pairs to evaluate
crop_size:          256
ransac_thresh:      3.0                # RANSAC inlier threshold (pixels)

# --- Runtime ---
batch_size:      8
num_workers:     4
prefetch_factor: 2

# --- Output ---
results_dir: evaluation_results        # where to save result CSVs